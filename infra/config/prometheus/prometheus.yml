global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: ultimate-asepharyana
    environment: production

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus

  # ── ElysiaJS API ────────────────────────────────────────────────────────────
  # Container name resolved via app-shared-net Docker bridge network
  - job_name: elysia-api
    metrics_path: /metrics
    static_configs:
      - targets: ['elysia-api:4092']
        labels:
          service: elysia-api

  # ── Rust API (Axum + axum-prometheus) ───────────────────────────────────────
  # axum-prometheus exposes standard http_requests_total, http_request_duration_seconds
  # at /metrics via metrics-exporter-prometheus
  - job_name: rust-api
    metrics_path: /metrics
    static_configs:
      - targets: ['rust-api:4091']
        labels:
          service: rust-api

  # ── Node Exporter (host system metrics) ─────────────────────────────────────
  - job_name: node
    static_configs:
      - targets: ['node-exporter-gavwa5i49rzh3mkdbzb4odap-144716135605:9100']
        labels:
          service: node-exporter

  # ── Redis Exporter ───────────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter-gavwa5i49rzh3mkdbzb4odap-144716157193:9121']
        labels:
          service: redis

  # ── MySQL Exporter ──────────────────────────────────────────────────────────
  - job_name: mysql
    static_configs:
      - targets: ['mysqld-exporter:9104']
        labels:
          service: mysql

  # ── Nginx Exporter ──────────────────────────────────────────────────────────
  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: nginx

  # ── MinIO (Native Metrics) ──────────────────────────────────────────────────
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: minio

  # ── Next.js Web ─────────────────────────────────────────────────────────────
  - job_name: nextjs-web
    metrics_path: /api/metrics
    static_configs:
      - targets: ['nextjs-web:3000']
        labels:
          service: nextjs-web

  # ── cAdvisor (Container Resource Metrics) ──────────────────────────────────
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor-gavwa5i49rzh3mkdbzb4odap-144716181660:8080']
        labels:
          service: cadvisor

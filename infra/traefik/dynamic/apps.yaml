http:
  routers:
    # ── NextJS ──
    nextjs:
      rule: "Host(`asepharyana.tech`)"
      entryPoints:
        - websecure
      tls: {}
      # middlewares:
      #   - common-chain@file
      service: nextjs-service

    # ── Leptos ──
    leptos:
      rule: "Host(`leptos.asepharyana.tech`)"
      entryPoints:
        - websecure
      tls: {}
      middlewares:
        - common-chain@file
      service: leptos-service

    # ── SolidJS ──
    solidjs:
      rule: "Host(`solidjs.asepharyana.tech`)"
      entryPoints:
        - websecure
      tls: {}
      middlewares:
        - common-chain@file
      service: solidjs-service

    # ── Rust API ──
    rust:
      rule: "Host(`rust.asepharyana.tech`)"
      entryPoints:
        - websecure
      tls: {}
      middlewares:
        - common-chain@file
      service: rust-service

    # ── Elysia API ──
    elysia:
      rule: "Host(`elysia.asepharyana.tech`)"
      entryPoints:
        - websecure
      tls: {}
      middlewares:
        - common-chain@file
      service: elysia-service

    # ── Picser API ──
    picser:
      rule: "Host(`picser.asepharyana.tech`)"
      entryPoints:
        - websecure
      tls: {}
      middlewares:
        - common-chain@file
      service: picser-service

  services:
    nextjs-service:
      loadBalancer:
        servers:
          - url: "http://nextjs-web:3000"
    leptos-service:
      loadBalancer:
        servers:
          - url: "http://leptos-web:3000"
    solidjs-service:
      loadBalancer:
        servers:
          - url: "http://solidjs-web:80"
    rust-service:
      loadBalancer:
        servers:
          - url: "http://rust-api:4091"
    elysia-service:
      loadBalancer:
        servers:
          - url: "http://elysia-api:4092"
    picser-service:
      loadBalancer:
        servers:
          - url: "http://picser:3000"

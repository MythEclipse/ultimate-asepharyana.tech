services:
  solidjs-web:
    container_name: solidjs-web
    image: ghcr.io/mytheclipse/ultimate-asepharyana.tech/solidjs-web:sha-4ad9c6d
    restart: always
    networks: [app-shared-net]
    environment:
      - VITE_RUST_API=https://rust.asepharyana.tech
      - VITE_ELYSIA_API=https://elysia.asepharyana.tech
networks:
  app-shared-net:
    name: app-shared-net
    external: true

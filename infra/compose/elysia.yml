services:
  elysia-api:
    image: ghcr.io/mytheclipse/ultimate-asepharyana.tech/elysia-api:sha-3bd7b87
    restart: always
    networks:
      app-shared-net:
        aliases:
          - elysia-api
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=mysql://asephs:hunterz@mysql:3306/sosmed
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=273742
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${SHARED_MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${SHARED_MINIO_ROOT_PASSWORD}

      - MINIO_BUCKET_NAME=api

networks:
  app-shared-net:
    name: app-shared-net
    external: true

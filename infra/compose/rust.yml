services:
  rust-api:
    image: ghcr.io/mytheclipse/ultimate-asepharyana.tech/rust-api:sha-5e54d2c
    restart: always
    networks: [app-shared-net]
    environment:
      - DATABASE_URL=mysql://asephs:hunterz@mysql:3306/sosmed
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=273742
      - EXTERNAL_BROWSERLESS_WS=${EXTERNAL_BROWSERLESS_WS}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rust.rule=Host(`rust.asepharyana.tech`)"
      - "traefik.http.routers.rust.entrypoints=websecure"
      - "traefik.http.routers.rust.tls=true"
      - "traefik.http.services.rust.loadbalancer.server.port=4091"
networks:
  app-shared-net:
    name: app-shared-net
    external: true

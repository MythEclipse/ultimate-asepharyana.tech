services:
  picser:
    image: ghcr.io/mytheclipse/picser:sha-1887d62e3a1ae59865aa46fa93ac505a7b84897e
    restart: always
    networks: [app-shared-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.picser.rule=Host(`picser.asepharyana.tech`)"
      - "traefik.http.routers.picser.entrypoints=websecure"
      - "traefik.http.routers.picser.tls=true"
      - "traefik.http.services.picser.loadbalancer.server.port=3000"
networks:
  app-shared-net:
    name: app-shared-net
    external: true

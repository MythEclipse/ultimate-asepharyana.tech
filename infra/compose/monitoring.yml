services:
  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    restart: always
    networks:
      - app-shared-net
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.prometheus.rule=Host(`prometheus.asepharyana.tech`)'
      - 'traefik.http.routers.prometheus.entrypoints=websecure'
      - 'traefik.http.routers.prometheus.tls=true'
      - 'traefik.http.routers.prometheus.middlewares=secure-headers@file,compress@file,retry@file,rate-limit@file,buffer@file'
      - 'traefik.http.services.prometheus.loadbalancer.server.port=9090'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      # Keep 30 days of data
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      # Allow Prometheus to accept OTLP if needed later
      - '--enable-feature=exemplar-storage'
    ports:
      - '${MONITORING_PROMETHEUS_PORT:-9490}:9090'
    healthcheck:
      test: ['CMD', 'promtool', 'check', 'ready']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      alertmanager:
        condition: service_started

  # ── Alertmanager (notification routing) ──────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: always
    networks:
      - app-shared-net
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --quiet --tries=1 --spider http://localhost:9093/-/ready || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Grafana ────────────────────────────────────────────────────────────────────────
  grafana:
    container_name: grafana
    image: grafana/grafana:11.0.0
    restart: always
    networks:
      - app-shared-net
    env_file:
      - ../../.env
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`grafana.asepharyana.tech`)'
      - 'traefik.http.routers.grafana.entrypoints=websecure'
      - 'traefik.http.routers.grafana.tls=true'
      - 'traefik.http.routers.grafana.middlewares=secure-headers@file,compress@file,retry@file,rate-limit@file,buffer@file'
      - 'traefik.http.services.grafana.loadbalancer.server.port=3000'
    environment:
      # Grafana admin credentials
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      # Disable telemetry
      GF_METRICS_ENABLED: 'true'
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - '${MONITORING_GRAFANA_PORT:-3490}:3000'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:3000/api/health',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Node Exporter (host system metrics) ─────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    restart: always
    networks:
      app-shared-net:
        aliases:
          - node-exporter
    # Exposes host /proc, /sys, /rootfs as read-only
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  # ── Redis Exporter ───────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: always
    networks:
      app-shared-net:
        aliases:
          - redis-exporter
    environment:
      # Uses Redis container name via shared network DNS
      REDIS_ADDR: redis://redis:6379

  # ── MySQL Exporter ──────────────────────────────────────────────────────────
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    restart: always
    networks:
      app-shared-net:
        aliases:
          - mysqld-exporter
    volumes:
      - ./config/prometheus/.my.cnf:/etc/prometheus/.my.cnf:ro
    command:
      - '--config.my-cnf=/etc/prometheus/.my.cnf'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:9104/metrics',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.2.0
    restart: always
    networks:
      app-shared-net:
        aliases:
          - nginx-exporter
    command:
      - '-nginx.scrape-uri=http://leptos-web:80/stub_status'

  # ── cAdvisor (container-level resource metrics) ──────────────────────────────────
  # ── cAdvisor (container-level resource metrics) ──────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: always
    networks:
      app-shared-net:
        aliases:
          - cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true

  # ── Portainer (Docker Management) ───────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    restart: always
    networks:
      - app-shared-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.asepharyana.tech`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.middlewares=secure-headers@file,compress@file,retry@file,rate-limit@file,buffer@file"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    command: --admin-password "$$2b$$10$$IrtGz.4b7t4PjDHfdud0feW7ZmHFV3qFd3LUoqg3vj6Vjidrtkg4i"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - '${MONITORING_PORTAINER_PORT:-9499}:9000'


networks:
  app-shared-net:
    name: app-shared-net
    external: true

volumes:
  prometheus_data:
  grafana_data:
  portainer_data:


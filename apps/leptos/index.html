<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asepharyana | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      data-trunk
      rel="rust"
      data-target-name="apps-leptos"
      data-wasm-opt="0"
    />
    <link data-trunk rel="css" href="style/output.css" />
    <link data-trunk rel="copy-dir" href="public" />
  </head>
  <body class="bg-background text-foreground selection:bg-indigo-500/30">
    <!-- Real-time WASM Loading Overlay -->
    <div
      id="loading-overlay"
      class="fixed inset-0 z-[100] flex flex-col items-center justify-center transition-opacity duration-1000 overflow-hidden font-mono"
    >
      <!-- Ambient Backglow -->
      <div
        class="lo-orb1 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[40rem] h-[40rem] rounded-full blur-[150px] pointer-events-none"
      ></div>
      <div
        class="lo-orb2 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[30rem] h-[30rem] rounded-full blur-[100px] pointer-events-none animate-pulse-slow"
      ></div>

      <!-- Holographic Grid Background -->
      <div
        class="absolute inset-0 pointer-events-none opacity-[0.03] bg-[linear-gradient(rgba(99,102,241,0.15)_1px,transparent_1px),linear-gradient(90deg,rgba(99,102,241,0.15)_1px,transparent_1px)] bg-[size:40px_40px] [transform:perspective(500px)_rotateX(60deg)_translateY(-100px)_scale(2)]"
      ></div>

      <!-- Main Central Interface -->
      <div
        class="relative z-10 flex flex-col items-center justify-center gap-12 w-full max-w-2xl px-6"
      >
        <!-- The Core -->
        <div
          class="relative flex items-center justify-center w-64 h-64 md:w-80 md:h-80"
        >
          <div
            class="absolute inset-0 rounded-full border border-indigo-500/20 border-t-indigo-500 shadow-[0_0_30px_rgba(99,102,241,0.2)] animate-[spin_4s_linear_infinite]"
          ></div>
          <div
            class="absolute inset-6 rounded-full border border-purple-500/20 border-b-purple-500 border-l-purple-500 animate-[spin_3s_linear_infinite_reverse]"
          ></div>
          <div
            class="absolute inset-12 rounded-full border border-dashed border-blue-400/30 animate-[spin_8s_linear_infinite]"
          ></div>

          <div class="relative z-10 flex flex-col items-center justify-center">
            <div
              id="loading-label"
              class="text-sm font-black tracking-[0.4em] mb-2 uppercase"
            >
              TERMINAL.INIT
            </div>
            <div
              class="text-6xl md:text-7xl font-black tracking-tighter drop-shadow-[0_0_15px_rgba(99,102,241,0.4)]"
            >
              <span id="loading-progress">00</span
              ><span id="loading-percent" class="text-3xl">%</span>
            </div>
            <span
              id="loading-status"
              class="text-[9px] tracking-[0.3em] mt-2 uppercase"
              >System Booting</span
            >
          </div>
        </div>

        <!-- Terminal Output -->
        <div
          id="loading-terminal"
          class="w-full max-w-lg border rounded-xl p-4 md:p-6 backdrop-blur-md shadow-2xl relative overflow-hidden"
        >
          <div class="flex items-center gap-2 mb-4">
            <div class="lo-dot-red w-2 h-2 rounded-full"></div>
            <div class="lo-dot-yel w-2 h-2 rounded-full"></div>
            <div class="lo-dot-grn w-2 h-2 rounded-full"></div>
            <span
              class="lo-term-id ml-2 text-[8px] tracking-widest uppercase font-bold"
              >Terminal_Access_v4.2</span
            >
          </div>

          <div
            id="loading-logs"
            class="space-y-1.5 h-32 flex flex-col justify-end overflow-hidden mask-image-b-fade"
          >
            <div
              class="text-[10px] md:text-xs font-medium tracking-wider"
              style="color: var(--lo-terminal-text)"
            >
              <span class="lo-prompt mr-3">>_</span>[SYS] INITIALIZING NEURAL
              ENGINE
            </div>
          </div>

          <div
            class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-indigo-500/5 to-transparent h-10 animate-scan"
          ></div>
        </div>
      </div>

      <div
        class="absolute inset-0 pointer-events-none scanlines opacity-10"
      ></div>
    </div>

    <script type="module">
      async function main() {
        // ── Theme detection: apply light-overlay class before overlay shows ──
        const prefersDark = window.matchMedia(
          '(prefers-color-scheme: dark)',
        ).matches;
        const htmlEl = document.documentElement;
        const hasDarkClass = htmlEl.classList.contains('dark');
        const hasLightClass = htmlEl.classList.contains('light');
        const isLight = hasLightClass || (!hasDarkClass && !prefersDark);
        if (isLight) htmlEl.classList.add('light-overlay');
        // Re-detect if theme changes (user toggles mid-load)
        window
          .matchMedia('(prefers-color-scheme: dark)')
          .addEventListener('change', (e) => {
            if (e.matches) htmlEl.classList.remove('light-overlay');
            else htmlEl.classList.add('light-overlay');
          });

        const overlay = document.getElementById('loading-overlay');
        const progressEl = document.getElementById('loading-progress');
        const statusEl = document.getElementById('loading-status');
        const logsEl = document.getElementById('loading-logs');

        const stats = {
          app: { received: 0, total: 0 },
          visuals: { received: 0, total: 0 },
          lastUpdate: performance.now(),
          lastBytes: 0,
          speed: '0 B/s',
        };

        function addLog(msg, color) {
          const promptColor =
            getComputedStyle(document.documentElement)
              .getPropertyValue('--lo-terminal-prompt')
              .trim() || 'rgba(255,255,255,0.3)';
          const textColor =
            color ||
            getComputedStyle(document.documentElement)
              .getPropertyValue('--lo-terminal-text')
              .trim() ||
            '#818cf8';
          const div = document.createElement('div');
          div.className =
            'text-[10px] md:text-xs font-medium tracking-wider animate-slide-up';
          div.style.color = textColor;
          div.innerHTML = `<span style="color:${promptColor};margin-right:0.75rem;">>_</span>${msg}`;
          logsEl.appendChild(div);
          while (logsEl.children.length > 6)
            logsEl.removeChild(logsEl.firstChild);
        }

        function formatBytes(bytes) {
          if (bytes < 1024) return bytes + ' B';
          if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
          return (bytes / 1048576).toFixed(2) + ' MB';
        }

        function updateUI() {
          const totalReceived = stats.app.received + stats.visuals.received;
          const totalExpected =
            (stats.app.total || 3000000) + (stats.visuals.total || 4500000);

          const now = performance.now();
          if (now - stats.lastUpdate > 400) {
            const duration = (now - stats.lastUpdate) / 1000;
            const delta = totalReceived - stats.lastBytes;
            stats.speed = formatBytes(delta / duration) + '/s';
            stats.lastUpdate = now;
            stats.lastBytes = totalReceived;
          }

          const progress = Math.min(
            99,
            Math.floor((totalReceived / totalExpected) * 100),
          );
          const cs = getComputedStyle(document.documentElement);
          const accentColor =
            cs.getPropertyValue('--lo-terminal-text').trim() ||
            'rgba(129,140,248,1)';
          const dimColor =
            cs.getPropertyValue('--lo-fg-dim').trim() ||
            'rgba(255,255,255,0.2)';
          const greenColor =
            cs.getPropertyValue('--lo-dot-green').trim() ||
            'rgba(74,222,128,1)';
          progressEl.textContent = progress.toString().padStart(2, '0');
          statusEl.innerHTML = `<span style="color:${accentColor};font-weight:700">${formatBytes(totalReceived)}</span> / ${formatBytes(totalExpected)} <span style="color:${dimColor};padding:0 0.5rem">|</span> <span style="color:${greenColor};font-weight:700">${stats.speed}</span>`;
        }

        addLog('INITIALIZING GLOBAL_SYNC_V4...');

        const safetyTimer = setTimeout(() => {
          if (overlay.style.display !== 'none') {
            addLog('ERR: SYNC_TIMEOUT // BYPASSING_OVERLAY', '#f87171');
            overlay.style.opacity = '0';
            setTimeout(() => (overlay.style.display = 'none'), 1000);
          }
        }, 60000);

        async function fetchWithProgress(url, type) {
          try {
            // Remove cache: 'no-cache' to allow browser to use preloads
            const response = await fetch(url);
            if (!response.ok) return;

            stats[type].total =
              +response.headers.get('Content-Length') || stats[type].total;
            const reader = response.body.getReader();

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              stats[type].received += value.length;
              updateUI();
            }
            addLog(`${type.toUpperCase()}_SYNC_COMPLETE`, '#4ade80');
          } catch (e) {
            addLog(`WARN: ${type.toUpperCase()}_FETCH_FAILED`, '#fbbf24');
          }
        }

        const wasmLink =
          document.querySelector('link[rel="preload"][as="fetch"]') ||
          document.querySelector('link[rel="modulepreload"][href$=".wasm"]');
        const mainWasmPromise = wasmLink
          ? fetchWithProgress(wasmLink.href, 'app')
          : Promise.resolve();

        const visualsUrl = 'https://visuals.asepharyana.tech/';
        addLog('DETECTING VISUALS_IFRAME_PROTOCOL...');

        const visualsPromise = (async () => {
          try {
            const htmlResp = await fetch(visualsUrl);
            const htmlText = await htmlResp.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const link =
              doc.querySelector('link[rel="preload"][as="fetch"]') ||
              doc.querySelector('link[rel="modulepreload"][href$=".wasm"]');

            if (link) {
              const wasmUrl = new URL(link.getAttribute('href'), visualsUrl)
                .href;
              addLog(
                `RESOLVED VISUAL_BINARY: ${wasmUrl.split('/').pop().substring(0, 8)}...`,
              );
              await fetchWithProgress(wasmUrl, 'visuals');
            }
          } catch (e) {
            addLog('WARN: VISUALS_SYNC_BYPASSED', '#fbbf24');
          }
        })();

        const hideOverlay = () => {
          addLog('ALL_PROTOCOLS_READY // ENTERING MAINFRAME', '#4ade80');
          progressEl.textContent = '100';
          clearTimeout(safetyTimer);
          setTimeout(() => {
            overlay.style.opacity = '0';
            setTimeout(() => (overlay.style.display = 'none'), 1000);
          }, 500);
        };

        // app-ready fires when WASM mounts (progress tracking only)
        window.addEventListener('app-ready', () => {
          window.__LEPTOS_READY = true;
          addLog('WASM_MOUNTED // AWAITING_CONTENT_SIGNAL...', '#a5b4fc');
        });

        // leptos-content-ready fires from Leptos AFTER first render cycle
        // This is the signal to hide the overlay — it covers both
        // WASM download AND the first route's data fetch.
        window.addEventListener('leptos-content-ready', () => {
          Promise.all([mainWasmPromise, visualsPromise]).then(hideOverlay);
        });

        // Fallback safety: if leptos-content-ready never fires (e.g. cached WASM
        // boots faster than the event), use polling on __LEPTOS_READY + delay
        const pollTimer = setInterval(() => {
          if (window.__LEPTOS_READY) {
            clearInterval(pollTimer);
            // Give Leptos extra time to dispatch leptos-content-ready
            // If it doesn't fire within 3s, force hide.
            setTimeout(() => {
              if (overlay.style.display !== 'none' && overlay.style.opacity !== '0') {
                addLog('FALLBACK_HIDE // CONTENT_SIGNAL_TIMEOUT', '#fbbf24');
                Promise.all([mainWasmPromise, visualsPromise]).then(hideOverlay);
              }
            }, 3000);
          }
        }, 100);

        addLog('MOUNTING_WASM_INSTANCE...', '#4ade80');
      }
      main();
    </script>
  </body>
</html>

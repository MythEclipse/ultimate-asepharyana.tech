<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asepharyana | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      data-trunk
      rel="rust"
      data-target-name="apps-leptos"
      data-wasm-opt="0"
    />
    <link data-trunk rel="css" href="style/output.css" />
    <link data-trunk rel="copy-dir" href="public" />
  </head>
  <body class="bg-[#030305]">
    <!-- Real-time WASM Loading Overlay -->
    <div
      id="loading-overlay"
      class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#030305] transition-opacity duration-1000 overflow-hidden font-mono"
    >
      <!-- Ambient Backglow -->
      <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[40rem] h-[40rem] bg-indigo-500/10 rounded-full blur-[150px] pointer-events-none"
      ></div>
      <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[30rem] h-[30rem] bg-purple-500/10 rounded-full blur-[100px] pointer-events-none animate-pulse-slow"
      ></div>

      <!-- Holographic Grid Background -->
      <div
        class="absolute inset-0 pointer-events-none opacity-[0.03] bg-[linear-gradient(rgba(255,255,255,0.1)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.1)_1px,transparent_1px)] bg-[size:40px_40px] [transform:perspective(500px)_rotateX(60deg)_translateY(-100px)_scale(2)]"
      ></div>

      <!-- Main Central Interface -->
      <div
        class="relative z-10 flex flex-col items-center justify-center gap-12 w-full max-w-2xl px-6"
      >
        <!-- The Core -->
        <div
          class="relative flex items-center justify-center w-64 h-64 md:w-80 md:h-80"
        >
          <div
            class="absolute inset-0 rounded-full border border-indigo-500/20 border-t-indigo-500 shadow-[0_0_30px_rgba(99,102,241,0.2)] animate-[spin_4s_linear_infinite]"
          ></div>
          <div
            class="absolute inset-6 rounded-full border border-purple-500/20 border-b-purple-500 border-l-purple-500 animate-[spin_3s_linear_infinite_reverse]"
          ></div>
          <div
            class="absolute inset-12 rounded-full border border-dashed border-blue-400/30 animate-[spin_8s_linear_infinite]"
          ></div>

          <div class="relative z-10 flex flex-col items-center justify-center">
            <div
              id="loading-label"
              class="text-sm font-black text-indigo-400 tracking-[0.4em] mb-2 uppercase"
            >
              TERMINAL.INIT
            </div>
            <div
              class="text-6xl md:text-7xl font-black text-white tracking-tighter drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]"
            >
              <span id="loading-progress">00</span
              ><span class="text-3xl text-indigo-500/80">%</span>
            </div>
            <span
              id="loading-status"
              class="text-[9px] text-muted-foreground tracking-[0.3em] mt-2 uppercase"
              >System Booting</span
            >
          </div>
        </div>

        <!-- Terminal Output -->
        <div
          class="w-full max-w-lg bg-black/40 border border-white/10 rounded-xl p-4 md:p-6 backdrop-blur-md shadow-2xl relative overflow-hidden"
        >
          <div class="flex items-center gap-2 mb-4">
            <div class="w-2 h-2 rounded-full bg-red-500/50"></div>
            <div class="w-2 h-2 rounded-full bg-yellow-500/50"></div>
            <div class="w-2 h-2 rounded-full bg-green-500"></div>
            <span
              class="ml-2 text-[8px] text-white/30 tracking-widest uppercase font-bold"
              >Terminal_Access_v4.2</span
            >
          </div>

          <div
            id="loading-logs"
            class="space-y-1.5 h-32 flex flex-col justify-end overflow-hidden mask-image-b-fade"
          >
            <div
              class="text-[10px] md:text-xs font-medium tracking-wider text-[#818cf8]"
            >
              <span class="text-white/30 mr-3">>_</span>[SYS] INITIALIZING
              NEURAL ENGINE
            </div>
          </div>

          <div
            class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-indigo-500/5 to-transparent h-10 animate-scan"
          ></div>
        </div>
      </div>

      <div
        class="absolute inset-0 pointer-events-none scanlines opacity-10"
      ></div>
    </div>

    <script type="module">
      async function main() {
        const overlay = document.getElementById('loading-overlay');
        const progressEl = document.getElementById('loading-progress');
        const statusEl = document.getElementById('loading-status');
        const logsEl = document.getElementById('loading-logs');

        const stats = {
          app: { received: 0, total: 0 },
          visuals: { received: 0, total: 0 },
          lastUpdate: performance.now(),
          lastBytes: 0,
          speed: '0 B/s'
        };

        function addLog(msg, color = '#818cf8') {
          const div = document.createElement('div');
          div.className = 'text-[10px] md:text-xs font-medium tracking-wider animate-slide-up';
          div.style.color = color;
          div.innerHTML = `<span class="text-white/30 mr-3">>_</span>${msg}`;
          logsEl.appendChild(div);
          while (logsEl.children.length > 6) logsEl.removeChild(logsEl.firstChild);
        }

        function formatBytes(bytes) {
          if (bytes < 1024) return bytes + ' B';
          if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
          return (bytes / 1048576).toFixed(2) + ' MB';
        }

        function updateUI() {
          const totalReceived = stats.app.received + stats.visuals.received;
          const totalExpected = (stats.app.total || 3000000) + (stats.visuals.total || 4500000);
          
          const now = performance.now();
          if (now - stats.lastUpdate > 400) {
            const duration = (now - stats.lastUpdate) / 1000;
            const delta = totalReceived - stats.lastBytes;
            stats.speed = formatBytes(delta / duration) + '/s';
            stats.lastUpdate = now;
            stats.lastBytes = totalReceived;
          }

          const progress = Math.min(99, Math.floor((totalReceived / totalExpected) * 100));
          progressEl.textContent = progress.toString().padStart(2, '0');
          statusEl.innerHTML = `<span class="text-indigo-400 font-bold">${formatBytes(totalReceived)}</span> / ${formatBytes(totalExpected)} <span class="text-white/20 px-2">|</span> <span class="text-green-400 font-bold">${stats.speed}</span>`;
        }

        addLog("INITIALIZING GLOBAL_SYNC_V4...");
        
        const safetyTimer = setTimeout(() => {
          if (overlay.style.display !== 'none') {
            addLog("ERR: SYNC_TIMEOUT // BYPASSING_OVERLAY", "#f87171");
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);
          }
        }, 60000);

        async function fetchWithProgress(url, type) {
          try {
            const response = await fetch(url, { cache: 'no-cache' });
            if (!response.ok) return;

            stats[type].total = +response.headers.get('Content-Length') || stats[type].total;
            const reader = response.body.getReader();

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              stats[type].received += value.length;
              updateUI();
            }
            addLog(`${type.toUpperCase()}_SYNC_COMPLETE`, '#4ade80');
          } catch (e) {
            addLog(`WARN: ${type.toUpperCase()}_FETCH_FAILED`, '#fbbf24');
          }
        }

        const wasmLink =
          document.querySelector('link[rel="preload"][as="fetch"]') ||
          document.querySelector('link[rel="modulepreload"][href$=".wasm"]');
        const mainWasmPromise = wasmLink
          ? fetchWithProgress(wasmLink.href, 'app')
          : Promise.resolve();

        const visualsUrl = 'https://visuals.asepharyana.tech/';
        addLog('DETECTING VISUALS_IFRAME_PROTOCOL...');

        const visualsPromise = (async () => {
          try {
            const htmlResp = await fetch(visualsUrl);
            const htmlText = await htmlResp.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const link =
              doc.querySelector('link[rel="preload"][as="fetch"]') ||
              doc.querySelector('link[rel="modulepreload"][href$=".wasm"]');

            if (link) {
              const wasmUrl = new URL(link.getAttribute('href'), visualsUrl)
                .href;
              addLog(
                `RESOLVED VISUAL_BINARY: ${wasmUrl.split('/').pop().substring(0, 8)}...`,
              );
              await fetchWithProgress(wasmUrl, 'visuals');
            }
          } catch (e) {
            addLog('WARN: VISUALS_SYNC_BYPASSED', '#fbbf24');
          }
        })();

        window.addEventListener('app-ready', () => {
          Promise.all([mainWasmPromise, visualsPromise]).then(() => {
            addLog('ALL_PROTOCOLS_READY // ENTERING MAINFRAME', '#4ade80');
            progressEl.textContent = '100';
            clearTimeout(safetyTimer);
            setTimeout(() => {
              overlay.style.opacity = '0';
              setTimeout(() => (overlay.style.display = 'none'), 1000);
            }, 500);
          });
        });
      }
      main();
    </script>
  </body>
</html>

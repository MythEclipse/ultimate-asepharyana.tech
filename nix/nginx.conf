daemon off;
error_log stderr info;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 512M;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Basic Proxy Settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # asepharyana.tech (Next.js)
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name asepharyana.tech;

        ssl_certificate /root/asephstech.pem;
        ssl_certificate_key /root/asephscloud.key;

        if ($scheme = http) {
            return 301 https://$host$request_uri;
        }

        location / {
            proxy_pass http://127.0.0.1:3001;
        }
    }

    # visuals.asepharyana.tech (SolidJS)
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name visuals.asepharyana.tech;

        ssl_certificate /root/asephstech.pem;
        ssl_certificate_key /root/asephscloud.key;

        if ($scheme = http) {
            return 301 https://$host$request_uri;
        }

        location / {
            proxy_pass http://127.0.0.1:3010;
        }
    }

    # elysia.asepharyana.tech (Elysia API)
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name elysia.asepharyana.tech;

        ssl_certificate /root/asephstech.pem;
        ssl_certificate_key /root/asephscloud.key;

        if ($scheme = http) {
            return 301 https://$host$request_uri;
        }

        location / {
            proxy_pass http://127.0.0.1:4092;
        }
    }

    # rust.asepharyana.tech (Rust API)
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name rust.asepharyana.tech;

        ssl_certificate /root/asephstech.pem;
        ssl_certificate_key /root/asephscloud.key;

        if ($scheme = http) {
            return 301 https://$host$request_uri;
        }

        location / {
            proxy_pass http://127.0.0.1:8080;
        }
    }
}

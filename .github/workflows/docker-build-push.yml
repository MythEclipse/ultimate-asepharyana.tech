      - name: Sync submodule locally (dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [ "${SERVICE}" == "leptos-web" ] && [ -n "$SHA" ]; then
            cd apps/leptos && git fetch origin && git checkout "$SHA"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@v18
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build Nix Docker image
        run: |
          set -euo pipefail
          nix --extra-experimental-features 'nix-command flakes' build .#docker-leptos --no-link -o build-result
      - name: Load and push Docker image
        run: |
          set -euo pipefail
          if [ -f "build-result" ] && [ ! -d "build-result" ]; then
            IMAGE_FILE="build-result"
          else
            IMAGE_FILE=$(find build-result -maxdepth 1 -type f \( -name '*.tar' -o -name '*.tar.gz' -o -name '*.oci' -o -name '*.tar.xz' \) | head -n 1)
            if [ -z "$IMAGE_FILE" ]; then

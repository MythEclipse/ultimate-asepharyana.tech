            ls -la build-result
            exit 1
          fi

          LOADED=$(docker load --input "$IMAGE_FILE")
          echo "$LOADED"
          IMAGE_NAME=$(printf '%s\n' "$LOADED" | awk -F': ' '/Loaded image:/ {print $2}' | tail -n 1)
          if [ -z "$IMAGE_NAME" ]; then

          if [ -f "build-result" ] && [ ! -d "build-result" ]; then
            IMAGE_FILE="build-result"
          else
            IMAGE_FILE=$(find build-result -maxdepth 1 -type f \( -name '*.tar' -o -name '*.tar.gz' -o -name '*.oci' -o -name '*.tar.xz' \) | head -n 1)
            if [ -z "$IMAGE_FILE" ]; then

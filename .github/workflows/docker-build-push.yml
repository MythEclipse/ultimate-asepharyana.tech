name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/docker-build-push.yml'
      - 'infra/**'
      - '!infra/compose/**'
  repository_dispatch:
    types:
      - submodule-updated
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: mytheclipse/ultimate-asepharyana.tech

# ──────────────────────────────────────────────
# Phase 1: Detect which services have changed
# ──────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust-api: ${{ steps.filter.outputs.rust-api || steps.dispatch.outputs.rust-api }}
      elysia-api: ${{ steps.filter.outputs.elysia-api || steps.dispatch.outputs.elysia-api }}
      solidjs-web: ${{ steps.filter.outputs.solidjs-web || steps.dispatch.outputs.solidjs-web }}
      leptos-web: ${{ steps.filter.outputs.leptos-web || steps.dispatch.outputs.leptos-web }}
      visuals: ${{ steps.filter.outputs.visuals || steps.dispatch.outputs.visuals }}
      nextjs-web: ${{ steps.filter.outputs.nextjs-web || steps.dispatch.outputs.nextjs-web }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'repository_dispatch'
        with:
          # Optimization: No submodules needed for path filtering
          submodules: false
          fetch-depth: 1

      # ── Path-based detection for direct pushes to this repo ──
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            rust-api:
              - 'apps/rust/**'
              - '.github/workflows/docker-build-push.yml'
              - 'flake.nix'
              - 'nix/apps/rust.nix'
              - 'infra/docker/rust.Dockerfile'
            elysia-api:
              - 'apps/elysia/**'
              - 'packages/**'
              - '.github/workflows/docker-build-push.yml'
              - 'flake.nix'
              - 'nix/apps/elysia.nix'
              - 'infra/docker/elysia.Dockerfile'
            solidjs-web:
              - 'apps/solidjs/**'
              - '.github/workflows/docker-build-push.yml'
              - 'flake.nix'
              - 'nix/apps/solidjs.nix'
              - 'infra/docker/solidjs.Dockerfile'
              - 'infra/nginx/solidjs.conf'
            leptos-web:
              - 'apps/leptos/**'
              - '.github/workflows/docker-build-push.yml'
              - 'flake.nix'
              - 'nix/apps/leptos.nix'
              - 'infra/docker/leptos.Dockerfile'
              - 'infra/nginx/leptos.conf'
            visuals:
              - 'apps/visuals/**'
              - '.github/workflows/docker-build-push.yml'
              - 'flake.nix'
              - 'nix/apps/visuals.nix'
              - 'infra/docker/visuals.Dockerfile'
              - 'infra/nginx/visuals.conf'
            nextjs-web:
              - 'apps/nextjs/**'
              - '.github/workflows/docker-build-push.yml'
              - 'flake.nix'
              - 'nix/apps/nextjs.nix'
              - 'infra/docker/nextjs.Dockerfile'

      # ── Service-based detection for cross-repo dispatches ──
      - name: Parse repository_dispatch payload
        id: dispatch
        if: github.event_name == 'repository_dispatch'
        env:
          SERVICE: ${{ github.event.client_payload.service }}
        run: |
          declare -a SERVICES=("rust-api" "elysia-api" "solidjs-web" "leptos-web" "visuals" "nextjs-web")
          for svc in "${SERVICES[@]}"; do
            if [ "$SERVICE" = "$svc" ]; then
              echo "${svc}=true" >> $GITHUB_OUTPUT
            else
              echo "${svc}=false" >> $GITHUB_OUTPUT
            fi
          done
          echo "Dispatch received for service: $SERVICE"

  sync-submodule:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'submodule-updated'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update submodule ref
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          
          declare -A SERVICE_PATHS
          SERVICE_PATHS["rust-api"]="apps/rust"
          SERVICE_PATHS["elysia-api"]="apps/elysia"
          SERVICE_PATHS["solidjs-web"]="apps/solidjs"
          SERVICE_PATHS["leptos-web"]="apps/leptos"
          SERVICE_PATHS["visuals"]="apps/visuals"
          SERVICE_PATHS["nextjs-web"]="apps/nextjs"
          
          PATH_MAP=${SERVICE_PATHS[$SERVICE]}
          
          if [ -n "$PATH_MAP" ]; then
            echo "Syncing $PATH_MAP to ${SHA:-latest}..."
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git config pull.rebase true
            
            # Update submodule
            if [ -n "$SHA" ]; then
              # If we have a specific SHA, we fetch it
              cd "$PATH_MAP"
              git fetch origin
              git checkout "$SHA"
              cd -
            else
              git submodule update --remote "$PATH_MAP"
            fi
            
            # Commit and push
            if git diff --quiet "$PATH_MAP"; then
              echo "No changes in submodule $PATH_MAP"
            else
              git add "$PATH_MAP"
              git commit -m "chore: update submodule $PATH_MAP to ${SHA:-latest} [skip ci]"
              git pull --rebase origin main
              git push origin main
            fi
          fi

  # ──────────────────────────────────────────────
  # Phase 2: Build only changed services
  # ──────────────────────────────────────────────
  build-rust-api:
    needs: [changes]
    if: |
      always() && 
      (needs.changes.outputs.rust-api == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Sync submodule locally (dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [ "${SERVICE}" == "rust-api" ] && [ -n "$SHA" ]; then
            cd apps/rust && git fetch origin && git checkout "$SHA"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@v18
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build Nix Docker image
        run: |
          set -euo pipefail
          nix --extra-experimental-features 'nix-command flakes' build .#docker-rust --no-link -o build-result
      - name: Load and push Docker image
        run: |
          set -euo pipefail
          if [ -f "build-result" ] && [ ! -d "build-result" ]; then
            IMAGE_FILE="build-result"
          else
            IMAGE_FILE=$(find build-result -maxdepth 1 -type f \( -name '*.tar' -o -name '*.tar.gz' -o -name '*.oci' -o -name '*.tar.xz' \) | head -n 1)
            if [ -z "$IMAGE_FILE" ]; then
              IMAGE_FILE=$(find build-result -maxdepth 1 -type f | head -n 1)
            fi
          fi
          if [ -z "$IMAGE_FILE" ]; then
            echo "No Docker image file found in build-result"
            ls -la build-result
            exit 1
          fi

          LOADED=$(docker load --input "$IMAGE_FILE")
          echo "$LOADED"
          IMAGE_NAME=$(printf '%s\n' "$LOADED" | awk -F': ' '/Loaded image:/ {print $2}' | tail -n 1)
          if [ -z "$IMAGE_NAME" ]; then
            echo "Failed to detect loaded image name"
            exit 1
          fi

          SHORT_SHA=${GITHUB_SHA:0:7}
          TARGET_BASE=${REGISTRY}/${IMAGE_NAME_PREFIX}/rust-api
          docker tag "$IMAGE_NAME" "$TARGET_BASE:latest"
          docker tag "$IMAGE_NAME" "$TARGET_BASE:sha-$SHORT_SHA"
          docker push "$TARGET_BASE:latest"
          docker push "$TARGET_BASE:sha-$SHORT_SHA"

  build-elysia-api:
    needs: [changes]
    if: |
      always() && 
      (needs.changes.outputs.elysia-api == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:

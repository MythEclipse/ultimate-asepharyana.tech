name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/docker-build-push.yml'
      - 'infra/**'
      - '!infra/compose/**'
  repository_dispatch:
    types:
      - submodule-updated
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: mytheclipse/ultimate-asepharyana.tech

# ──────────────────────────────────────────────
# Phase 1: Detect which services have changed
# ──────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust-api: ${{ steps.filter.outputs.rust-api || steps.dispatch.outputs.rust-api }}
      elysia-api: ${{ steps.filter.outputs.elysia-api || steps.dispatch.outputs.elysia-api }}
      solidjs-web: ${{ steps.filter.outputs.solidjs-web || steps.dispatch.outputs.solidjs-web }}
      leptos-web: ${{ steps.filter.outputs.leptos-web || steps.dispatch.outputs.leptos-web }}
      visuals: ${{ steps.filter.outputs.visuals || steps.dispatch.outputs.visuals }}
      nextjs-web: ${{ steps.filter.outputs.nextjs-web || steps.dispatch.outputs.nextjs-web }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'repository_dispatch'
        with:
          submodules: recursive

      # ── Path-based detection for direct pushes to this repo ──
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            rust-api:
              - 'apps/rust/**'
              - '.github/workflows/docker-build-push.yml'
              - 'infra/docker/rust.Dockerfile'
            elysia-api:
              - 'apps/elysia/**'
              - 'packages/**'
              - '.github/workflows/docker-build-push.yml'
              - 'infra/docker/elysia.Dockerfile'
            solidjs-web:
              - 'apps/solidjs/**'
              - '.github/workflows/docker-build-push.yml'
              - 'infra/docker/solidjs.Dockerfile'
              - 'infra/nginx/solidjs.conf'
            leptos-web:
              - 'apps/leptos/**'
              - '.github/workflows/docker-build-push.yml'
              - 'infra/docker/leptos.Dockerfile'
              - 'infra/nginx/leptos.conf'
            visuals:
              - 'apps/visuals/**'
              - '.github/workflows/docker-build-push.yml'
              - 'infra/docker/visuals.Dockerfile'
              - 'infra/nginx/visuals.conf'
            nextjs-web:
              - 'apps/nextjs/**'
              - '.github/workflows/docker-build-push.yml'
              - 'infra/docker/nextjs.Dockerfile'

      # ── Service-based detection for cross-repo dispatches ──
      - name: Parse repository_dispatch payload
        id: dispatch
        if: github.event_name == 'repository_dispatch'
        env:
          SERVICE: ${{ github.event.client_payload.service }}
        run: |
          declare -a SERVICES=("rust-api" "elysia-api" "solidjs-web" "leptos-web" "visuals" "nextjs-web")
          for svc in "${SERVICES[@]}"; do
            if [ "$SERVICE" = "$svc" ]; then
              echo "${svc}=true" >> $GITHUB_OUTPUT
            else
              echo "${svc}=false" >> $GITHUB_OUTPUT
            fi
          done
          echo "Dispatch received for service: $SERVICE"

  sync-submodule:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'submodule-updated'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update submodule ref
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          
          declare -A SERVICE_PATHS
          SERVICE_PATHS["rust-api"]="apps/rust"
          SERVICE_PATHS["elysia-api"]="apps/elysia"
          SERVICE_PATHS["solidjs-web"]="apps/solidjs"
          SERVICE_PATHS["leptos-web"]="apps/leptos"
          SERVICE_PATHS["visuals"]="apps/visuals"
          SERVICE_PATHS["nextjs-web"]="apps/nextjs"
          
          PATH_MAP=${SERVICE_PATHS[$SERVICE]}
          
          if [ -n "$PATH_MAP" ]; then
            echo "Syncing $PATH_MAP to ${SHA:-latest}..."
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git config pull.rebase true
            
            # Update submodule
            if [ -n "$SHA" ]; then
              # If we have a specific SHA, we fetch it
              cd "$PATH_MAP"
              git fetch origin
              git checkout "$SHA"
              cd -
            else
              git submodule update --remote "$PATH_MAP"
            fi
            
            # Commit and push
            if git diff --quiet "$PATH_MAP"; then
              echo "No changes in submodule $PATH_MAP"
            else
              git add "$PATH_MAP"
              git commit -m "chore: update submodule $PATH_MAP to ${SHA:-latest} [skip ci]"
              git pull --rebase origin main
              git push origin main
            fi
          fi

  # ──────────────────────────────────────────────
  # Phase 2: Build only changed services
  # ──────────────────────────────────────────────
  build-rust-api:
    needs: [changes, sync-submodule]
    if: |
      always() && 
      (needs.changes.outputs.rust-api == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'repository_dispatch' || needs.sync-submodule.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Sync submodule locally (dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [ "${SERVICE}" == "rust-api" ] && [ -n "$SHA" ]; then
            cd apps/rust && git fetch origin && git checkout "$SHA"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/rust-api
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/rust.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rust-api
          cache-to: type=gha,mode=max,scope=rust-api

  build-elysia-api:
    needs: [changes, sync-submodule]
    if: |
      always() && 
      (needs.changes.outputs.elysia-api == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'repository_dispatch' || needs.sync-submodule.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Sync submodule locally (dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [ "${SERVICE}" == "elysia-api" ] && [ -n "$SHA" ]; then
            cd apps/elysia && git fetch origin && git checkout "$SHA"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/elysia-api
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/elysia.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=elysia-api
          cache-to: type=gha,mode=max,scope=elysia-api

  build-solidjs-web:
    needs: [changes, sync-submodule]
    if: |
      always() && 
      (needs.changes.outputs.solidjs-web == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'repository_dispatch' || needs.sync-submodule.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Sync submodule locally (dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [ "${SERVICE}" == "solidjs-web" ] && [ -n "$SHA" ]; then
            cd apps/solidjs && git fetch origin && git checkout "$SHA"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/solidjs-web
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/solidjs.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=solidjs-web
          cache-to: type=gha,mode=max,scope=solidjs-web

  build-leptos-web:
    needs: [changes, sync-submodule]
    if: |
      always() && 
      (needs.changes.outputs.leptos-web == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'repository_dispatch' || needs.sync-submodule.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Sync submodule locally (dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [ "${SERVICE}" == "leptos-web" ] && [ -n "$SHA" ]; then
            cd apps/leptos && git fetch origin && git checkout "$SHA"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/leptos-web
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/leptos.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VISUALS_URL=https://visuals.asepharyana.tech/
          cache-from: type=gha,scope=leptos-web
          cache-to: type=gha,mode=max,scope=leptos-web

  build-visuals:
    needs: [changes, sync-submodule]
    if: |
      always() && 
      (needs.changes.outputs.visuals == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'repository_dispatch' || needs.sync-submodule.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Sync submodule locally (dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [ "${SERVICE}" == "visuals" ] && [ -n "$SHA" ]; then
            cd apps/visuals && git fetch origin && git checkout "$SHA"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/visuals
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/visuals.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=visuals
          cache-to: type=gha,mode=max,scope=visuals

  build-nextjs-web:
    needs: [changes, sync-submodule]
    if: |
      always() && 
      (needs.changes.outputs.nextjs-web == 'true' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'repository_dispatch' || needs.sync-submodule.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Sync submodule locally (dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [ "${SERVICE}" == "nextjs-web" ] && [ -n "$SHA" ]; then
            cd apps/nextjs && git fetch origin && git checkout "$SHA"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/nextjs-web
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/nextjs.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=nextjs-web
          cache-to: type=gha,mode=max,scope=nextjs-web

  update-manifest:
    needs:
      [
        changes,
        build-rust-api,
        build-elysia-api,
        build-solidjs-web,
        build-leptos-web,
        build-visuals,
        build-nextjs-web,
      ]
    if: |
      always() &&
      (needs.build-rust-api.result == 'success' || 
       needs.build-elysia-api.result == 'success' || 
       needs.build-solidjs-web.result == 'success' || 
       needs.build-leptos-web.result == 'success' || 
       needs.build-visuals.result == 'success' ||
       needs.build-nextjs-web.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update docker-compose.yml tags
        run: |
          SHA="sha-${{ steps.vars.outputs.sha_short }}"
          echo "Updating infra/compose/ with tag: $SHA"

          # Update images only if they match the specified prefix
          # We use a loop or multiple seds to ensure we only update what's needed

          if [ "${{ needs.changes.outputs.rust-api }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/rust-api:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/rust-api:$SHA|g" infra/compose/rust.yml
          fi

          if [ "${{ needs.changes.outputs.elysia-api }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/elysia-api:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/elysia-api:$SHA|g" infra/compose/elysia.yml
          fi

          if [ "${{ needs.changes.outputs.solidjs-web }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/solidjs-web:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/solidjs-web:$SHA|g" infra/compose/solidjs.yml
          fi

          if [ "${{ needs.changes.outputs.leptos-web }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/leptos-web:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/leptos-web:$SHA|g" infra/compose/leptos.yml
          fi

          if [ "${{ needs.changes.outputs.visuals }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/visuals:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/visuals:$SHA|g" infra/compose/visuals.yml
          fi

          if [ "${{ needs.changes.outputs.nextjs-web }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/nextjs-web:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/nextjs-web:$SHA|g" infra/compose/nextjs.yml
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config pull.rebase true

          if git diff --quiet infra/compose/ apps/; then
            echo "No changes to commit"
          else
            git add infra/compose/ apps/
            git commit -m "chore: update manifests and submodules [skip ci]"
            # Use pull --rebase to handle any updates from other concurrent runs
            git pull --rebase origin main
            git push origin main
          fi

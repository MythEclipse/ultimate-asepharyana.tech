          if [ "${SERVICE}" == "elysia-api" ] && [ -n "$SHA" ]; then
            cd apps/elysia && git fetch origin && git checkout "$SHA"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@v18
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build Nix Docker image
        run: |
          set -euo pipefail
          nix --extra-experimental-features 'nix-command flakes' build .#docker-elysia --no-link -o build-result
      - name: Load and push Docker image
        run: |
          set -euo pipefail
          if [ -f "build-result" ] && [ ! -d "build-result" ]; then
            IMAGE_FILE="build-result"
          else
            IMAGE_FILE=$(find build-result -maxdepth 1 -type f \( -name '*.tar' -o -name '*.tar.gz' -o -name '*.oci' -o -name '*.tar.xz' \) | head -n 1)
            if [ -z "$IMAGE_FILE" ]; then
              IMAGE_FILE=$(find build-result -maxdepth 1 -type f | head -n 1)
            fi
          fi
          if [ -z "$IMAGE_FILE" ]; then
            echo "No Docker image file found in build-result"
            ls -la build-result
            exit 1
          fi

          LOADED=$(docker load --input "$IMAGE_FILE")
          echo "$LOADED"
          IMAGE_NAME=$(printf '%s\n' "$LOADED" | awk -F': ' '/Loaded image:/ {print $2}' | tail -n 1)
          if [ -z "$IMAGE_NAME" ]; then
            echo "Failed to detect loaded image name"
            exit 1
          fi

          SHORT_SHA=${GITHUB_SHA:0:7}
          TARGET_BASE=${REGISTRY}/${IMAGE_NAME_PREFIX}/elysia-api
          docker tag "$IMAGE_NAME" "$TARGET_BASE:latest"
          docker tag "$IMAGE_NAME" "$TARGET_BASE:sha-$SHORT_SHA"
          docker push "$TARGET_BASE:latest"
          docker push "$TARGET_BASE:sha-$SHORT_SHA"

  build-solidjs-web:
    needs: [changes]
    if: |
      always() && 
      (needs.changes.outputs.solidjs-web == 'true' || github.event_name == 'workflow_dispatch')

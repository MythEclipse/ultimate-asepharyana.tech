name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/docker-build-push.yml'
      - 'infra/compose/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: mytheclipse/ultimate-asepharyana.tech

# ──────────────────────────────────────────────
# Phase 1: Detect which services have changed
# ──────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust-api: ${{ steps.filter.outputs.rust-api }}
      elysia-api: ${{ steps.filter.outputs.elysia-api }}
      solidjs-web: ${{ steps.filter.outputs.solidjs-web }}
      leptos-web: ${{ steps.filter.outputs.leptos-web }}
      visuals: ${{ steps.filter.outputs.visuals }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust-api:
              - 'apps/rust/**'
              - '.github/workflows/docker-build-push.yml'
            elysia-api:
              - 'apps/elysia/**'
              - 'packages/**'
              - '.github/workflows/docker-build-push.yml'
            solidjs-web:
              - 'apps/solidjs/**'
              - '.github/workflows/docker-build-push.yml'
            leptos-web:
              - 'apps/leptos/**'
              - '.github/workflows/docker-build-push.yml'
            visuals:
              - 'apps/visuals/**'
              - '.github/workflows/docker-build-push.yml'

  # ──────────────────────────────────────────────
  # Phase 2: Build only changed services
  # ──────────────────────────────────────────────
  build-rust-api:
    needs: changes
    if: ${{ needs.changes.outputs.rust-api == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/rust-api
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/rust.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rust-api
          cache-to: type=gha,mode=max,scope=rust-api

  build-elysia-api:
    needs: changes
    if: ${{ needs.changes.outputs.elysia-api == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/elysia-api
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/elysia.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=elysia-api
          cache-to: type=gha,mode=max,scope=elysia-api

  build-solidjs-web:
    needs: changes
    if: ${{ needs.changes.outputs.solidjs-web == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/solidjs-web
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/solidjs.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=solidjs-web
          cache-to: type=gha,mode=max,scope=solidjs-web

  build-leptos-web:
    needs: changes
    if: ${{ needs.changes.outputs.leptos-web == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/leptos-web
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/leptos.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VISUALS_URL=https://visuals.asepharyana.tech/
          cache-from: type=gha,scope=leptos-web
          cache-to: type=gha,mode=max,scope=leptos-web

  build-visuals:
    needs: changes
    if: ${{ needs.changes.outputs.visuals == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/visuals
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/visuals.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=visuals
          cache-to: type=gha,mode=max,scope=visuals

  update-manifest:
    needs:
      [
        changes,
        build-rust-api,
        build-elysia-api,
        build-solidjs-web,
        build-leptos-web,
        build-visuals,
      ]
    if: |
      always() &&
      (needs.build-rust-api.result == 'success' || 
       needs.build-elysia-api.result == 'success' || 
       needs.build-solidjs-web.result == 'success' || 
       needs.build-leptos-web.result == 'success' || 
       needs.build-visuals.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Get Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update docker-compose.yml tags
        run: |
          SHA="sha-${{ steps.vars.outputs.sha_short }}"
          echo "Updating infra/compose/ with tag: $SHA"

          # Update images only if they match the specified prefix
          # We use a loop or multiple seds to ensure we only update what's needed

          if [ "${{ needs.changes.outputs.rust-api }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/rust-api:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/rust-api:$SHA|g" infra/compose/rust.yml
          fi

          if [ "${{ needs.changes.outputs.elysia-api }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/elysia-api:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/elysia-api:$SHA|g" infra/compose/elysia.yml
          fi

          if [ "${{ needs.changes.outputs.solidjs-web }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/solidjs-web:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/solidjs-web:$SHA|g" infra/compose/solidjs.yml
          fi

          if [ "${{ needs.changes.outputs.leptos-web }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/leptos-web:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/leptos-web:$SHA|g" infra/compose/leptos.yml
          fi

          if [ "${{ needs.changes.outputs.visuals }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/visuals:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/visuals:$SHA|g" infra/compose/visuals.yml
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet infra/compose/; then
            echo "No changes to compose files"
          else
            git add infra/compose/
            git commit -m "chore: update docker tags to sha-${{ steps.vars.outputs.sha_short }} [skip ci]"
            git push origin main
          fi

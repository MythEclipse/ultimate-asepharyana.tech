      - name: Build Nix Docker image
        run: |
          set -euo pipefail
          nix --extra-experimental-features 'nix-command flakes' build .#docker-solidjs --no-link -o build-result
      - name: Load and push Docker image
        run: |
          set -euo pipefail
          if [ -f "build-result" ] && [ ! -d "build-result" ]; then

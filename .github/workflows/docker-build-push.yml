          docker tag "$IMAGE_NAME" "$TARGET_BASE:sha-$SHORT_SHA"
          docker push "$TARGET_BASE:latest"
          docker push "$TARGET_BASE:sha-$SHORT_SHA"

  build-visuals:
    needs: [changes]
    if: |
      always() && 
      (needs.changes.outputs.visuals == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Sync submodule locally (dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [ "${SERVICE}" == "visuals" ] && [ -n "$SHA" ]; then
            cd apps/visuals && git fetch origin && git checkout "$SHA"
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@v18
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build Nix Docker image
        run: |

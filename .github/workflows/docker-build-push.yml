name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/docker-build-push.yml'
      - 'docker-compose.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: mytheclipse/ultimate-asepharyana.cloud

# ──────────────────────────────────────────────
# Phase 1: Detect which services have changed
# ──────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust-api: ${{ steps.filter.outputs.rust-api }}
      elysia-api: ${{ steps.filter.outputs.elysia-api }}
      solidjs-web: ${{ steps.filter.outputs.solidjs-web }}
      leptos-web: ${{ steps.filter.outputs.leptos-web }}
      visuals: ${{ steps.filter.outputs.visuals }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust-api:
              - 'apps/rust/**'
              - '.github/workflows/docker-build-push.yml'
            elysia-api:
              - 'apps/elysia/**'
              - 'packages/**'
              - '.github/workflows/docker-build-push.yml'
            solidjs-web:
              - 'apps/solidjs/**'
              - '.github/workflows/docker-build-push.yml'
            leptos-web:
              - 'apps/leptos/**'
              - '.github/workflows/docker-build-push.yml'
            visuals:
              - 'apps/visuals/**'
              - '.github/workflows/docker-build-push.yml'

  # ──────────────────────────────────────────────
  # Phase 2: Build only changed services
  # ──────────────────────────────────────────────
  build-rust-api:
    needs: changes
    if: ${{ needs.changes.outputs.rust-api == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/rust-api
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/rust/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=rust-api
          cache-to: type=gha,mode=max,scope=rust-api

  build-elysia-api:
    needs: changes
    if: ${{ needs.changes.outputs.elysia-api == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/elysia-api
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/elysia/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=elysia-api
          cache-to: type=gha,mode=max,scope=elysia-api

  build-solidjs-web:
    needs: changes
    if: ${{ needs.changes.outputs.solidjs-web == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/solidjs-web
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/solidjs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=solidjs-web
          cache-to: type=gha,mode=max,scope=solidjs-web

  build-leptos-web:
    needs: changes
    if: ${{ needs.changes.outputs.leptos-web == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/leptos-web
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/leptos/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VISUALS_URL=http://visuals.localhost
          cache-from: type=gha,scope=leptos-web
          cache-to: type=gha,mode=max,scope=leptos-web

  build-visuals:
    needs: changes
    if: ${{ needs.changes.outputs.visuals == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/visuals
          tags: |
            type=raw,value=latest
            type=sha,format=short
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/visuals/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=visuals
          cache-to: type=gha,mode=max,scope=visuals

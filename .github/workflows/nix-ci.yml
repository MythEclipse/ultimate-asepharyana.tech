name: Nix CI & Native Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        
      - name: Cachix Cache
        uses: cachix/cachix-action@v15
        with:
          name: mytheclipse
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: FlakeHub Push
        uses: DeterminateSystems/flakehub-push@v4
        with:
          visibility: public
          name: MythEclipse/ultimate-asepharyana.tech
          tag: 0.1.${{ github.run_number }}
          rolling: true
        env:
          FLAKEHUB_TOKEN: ${{ secrets.FLAKEHUB_TOKEN }}
        continue-on-error: true

      - name: Fix Untracked Files for Nix
        run: |
          git add -A

      - name: Build All Packages
        run: |
          nix build .#rust-backend
          nix build .#elysia
          nix build .#nextjs
          nix build .#solidjs
          nix build .#services

      - name: Deploy to VPS via Nix Copy
        if: github.ref == 'refs/heads/main'
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

          # Resolve remote nix binaries for non-login shells
          REMOTE_NIX_STORE_BIN=$(ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            command -v nix-store ||
            for p in /nix/var/nix/profiles/default/bin/nix-store /run/current-system/sw/bin/nix-store; do
              [ -x "$p" ] && echo "$p" && exit 0
            done
            exit 1
          ')
          REMOTE_NIX_BIN=$(ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            command -v nix ||
            for p in /nix/var/nix/profiles/default/bin/nix /run/current-system/sw/bin/nix; do
              [ -x "$p" ] && echo "$p" && exit 0
            done
            exit 1
          ')
          
          # Copy closures to VPS
          nix copy --to "ssh://${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}?remote-program=$REMOTE_NIX_STORE_BIN" \
            .#rust-backend \
            .#elysia \
            .#nextjs \
            .#solidjs \
            .#services

          # Restart services on VPS and capture remote logs
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} <<EOF
          cd ${{ secrets.VPS_TARGET_DIR }} || exit 1
          if [ ! -d .git ]; then
            echo "Error: target directory is not a git checkout (.git missing)" >&2
            exit 1
          fi
          git fetch origin main
          git reset --hard origin/main
          git submodule update --init --recursive
          mkdir -p ./deploy-logs
          LOG_FILE=./deploy-logs/services-$(date +%Y%m%d-%H%M%S).log
          setsid bash -lc "TERM=xterm PC_DISABLE_TUI=1 PC_NO_SERVER=1 PC_PORT_NUM=18080 ${REMOTE_NIX_BIN} run --no-write-lock-file .#services -- -d -t=false" >>"$LOG_FILE" 2>&1 < /dev/null &
          echo "Remote services started in background."
          echo "Remote log: $LOG_FILE"
          echo $! > ./deploy-logs/services.pid
          EOF

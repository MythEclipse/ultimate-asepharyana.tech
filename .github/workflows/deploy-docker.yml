name: Deploy Docker to VPS

on:
  workflow_run:
    workflows: ['Build and Push Docker Images']
    types:
      - completed
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'infra/compose/**'
      - '.github/workflows/deploy-docker.yml'
  workflow_dispatch:

# Prevent multiple deployments from running simultaneously
concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy with Docker Compose on VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR }}
          ENV_FILE_PRODUCTION: ${{ secrets.ENV_FILE_PRODUCTION }}
          ENV_PICSER: ${{ secrets.ENV_PICSER }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          SHARED_MYSQL_ROOT_PASSWORD: ${{ secrets.SHARED_MYSQL_ROOT_PASSWORD }}
          SHARED_MYSQL_DATABASE: ${{ secrets.SHARED_MYSQL_DATABASE }}
          SHARED_MYSQL_USER: ${{ secrets.SHARED_MYSQL_USER }}
          SHARED_MYSQL_PASSWORD: ${{ secrets.SHARED_MYSQL_PASSWORD }}
          SHARED_MINIO_ROOT_USER: ${{ secrets.SHARED_MINIO_ROOT_USER }}
          SHARED_MINIO_ROOT_PASSWORD: ${{ secrets.SHARED_MINIO_ROOT_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_PRIVATE_KEY:-}" ] || [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ] || [ -z "${VPS_TARGET_DIR:-}" ]; then
            echo "❌ Deployment secrets are not fully configured. Please set SSH_PRIVATE_KEY, VPS_HOST, VPS_USER, and VPS_TARGET_DIR."
            exit 1
          fi

          if [ -z "${GRAFANA_ADMIN_USER:-}" ] || [ -z "${GRAFANA_ADMIN_PASSWORD:-}" ]; then
            echo "❌ Grafana admin credentials are not configured. Please set GRAFANA_ADMIN_USER and GRAFANA_ADMIN_PASSWORD secrets."
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -t ed25519,rsa "$VPS_HOST" >> ~/.ssh/known_hosts

          # Use SSH multiplexing for faster subsequent commands
          SSH_OPTS="-o ControlMaster=auto -o ControlPath=/tmp/ssh-%r@%h:%p -o ControlPersist=600 -o StrictHostKeyChecking=yes"

          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" "mkdir -p $VPS_TARGET_DIR && mkdir -p $VPS_TARGET_DIR/infra/compose"
          echo "$ENV_FILE_PRODUCTION" > .env.prod
          {
            echo "GRAFANA_ADMIN_USER=$GRAFANA_ADMIN_USER"
            echo "GRAFANA_ADMIN_PASSWORD=$GRAFANA_ADMIN_PASSWORD"
            echo "SHARED_MYSQL_ROOT_PASSWORD=$SHARED_MYSQL_ROOT_PASSWORD"
            echo "SHARED_MYSQL_DATABASE=$SHARED_MYSQL_DATABASE"
            echo "SHARED_MYSQL_USER=$SHARED_MYSQL_USER"
            echo "SHARED_MYSQL_PASSWORD=$SHARED_MYSQL_PASSWORD"
            echo "SHARED_MINIO_ROOT_USER=$SHARED_MINIO_ROOT_USER"
            echo "SHARED_MINIO_ROOT_PASSWORD=$SHARED_MINIO_ROOT_PASSWORD"
          } >> .env.prod
          echo "$ENV_PICSER" > .env.picser
          scp $SSH_OPTS .env.prod "$VPS_USER@$VPS_HOST:$VPS_TARGET_DIR/.env"
          scp $SSH_OPTS .env.picser "$VPS_USER@$VPS_HOST:$VPS_TARGET_DIR/infra/compose/.env.picser"

          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" "export VPS_TARGET_DIR=$VPS_TARGET_DIR; bash -s" <<EOF
            set -euo pipefail

            cd "\$VPS_TARGET_DIR"

            # Ensure shared network exists
            docker network create app-shared-net || true

            # Kill existing Nginx/Proxy processes on host to free up 80/443
            fuser -k 80/tcp || true
            fuser -k 443/tcp || true
            git fetch origin main --depth=1 || true
            git reset --hard origin/main
            git submodule update --init --recursive --jobs 4

            if command -v "docker" >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "❌ docker compose is not installed on the remote host."
              exit 1
            fi

            echo "🚀 Pulling images in parallel..."
            \$COMPOSE_CMD -p infra-gateway -f infra/compose/traefik.yml pull &
            \$COMPOSE_CMD -p infra-shared -f infra/compose/shared.yml pull &
            \$COMPOSE_CMD -p infra-monitoring -f infra/compose/monitoring.yml pull &
            \$COMPOSE_CMD -p app-rust -f infra/compose/rust.yml pull &
            \$COMPOSE_CMD -p app-elysia -f infra/compose/elysia.yml pull &
            \$COMPOSE_CMD -p app-solidjs -f infra/compose/solidjs.yml pull &
            \$COMPOSE_CMD -p app-leptos -f infra/compose/leptos.yml pull &
            \$COMPOSE_CMD -p app-nextjs -f infra/compose/nextjs.yml pull &
            \$COMPOSE_CMD -p app-picser -f infra/compose/picser.yml pull &
            wait

            echo "🛑 Cleaning up target containers..."
            TARGETS="prometheus alertmanager grafana node-exporter redis-exporter mysqld-exporter nginx-exporter cadvisor portainer mysql redis minio traefik nextjs-web solidjs-web leptos-web rust-api elysia-api picser"
            
            # Use a combined filter for all target names
            FILTER_ARGS=""
            for name in \$TARGETS; do
              FILTER_ARGS="\$FILTER_ARGS --filter name=\$name"
            done
            
            CIDS=\$(docker ps -aq \$FILTER_ARGS)
            if [ -n "\$CIDS" ]; then
                echo "Removing containers: \$CIDS"
                docker rm -f \$CIDS || true
            fi

            # Final sweep for compose orphans
            docker rm -f \$(docker ps -aq --filter name="compose-") || true
            
            echo "⏳ Cooldown to allow daemon to release locks..."
            sleep 2
            
            echo "🏗️ Phase 1: Deploying Shared Infrastructure..."
            \$COMPOSE_CMD -p infra-shared -f infra/compose/shared.yml --env-file .env up -d --remove-orphans

            echo "🏗️ Phase 2: Deploying Apps and Monitoring in parallel..."
            \$COMPOSE_CMD -p infra-monitoring -f infra/compose/monitoring.yml --env-file .env up -d --remove-orphans &
            \$COMPOSE_CMD -p app-rust -f infra/compose/rust.yml --env-file .env up -d --remove-orphans &
            \$COMPOSE_CMD -p app-elysia -f infra/compose/elysia.yml --env-file .env up -d --remove-orphans &
            \$COMPOSE_CMD -p app-solidjs -f infra/compose/solidjs.yml --env-file .env up -d --remove-orphans &
            \$COMPOSE_CMD -p app-leptos -f infra/compose/leptos.yml --env-file .env up -d --remove-orphans &
            \$COMPOSE_CMD -p app-nextjs -f infra/compose/nextjs.yml --env-file .env up -d --remove-orphans &
            \$COMPOSE_CMD -p app-picser -f infra/compose/picser.yml --env-file .env up -d --remove-orphans &
            wait

            echo "🏗️ Phase 3: Deploying Traefik Gateway..."
            \$COMPOSE_CMD -p infra-gateway -f infra/compose/traefik.yml --env-file .env up -d --remove-orphans

            echo "✅ Deployment complete."
          EOF

      - name: Cleanup Docker resources
        if: always()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -t ed25519,rsa "$VPS_HOST" >> ~/.ssh/known_hosts
          
          echo "🧹 Cleaning up unused Docker images and resources on VPS..."
          ssh -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" "docker system prune -af --volumes || true"
          echo "✅ Cleanup complete."






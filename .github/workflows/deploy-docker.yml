name: Deploy Docker to VPS

on:
  workflow_run:
    workflows: ['Build and Push Docker Images']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_TARGET_DIR: ~/ultimate-asepharyana.cloud
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key $VPS_USER@$VPS_HOST "
            cd $VPS_TARGET_DIR
            # Pull latest changes (including updated docker-compose.yml)
            git fetch origin main
            git reset --hard origin/main
            
            # Login to GHCR (might need a personal access token if repo is private)
            # Actually, if the runner is logged in, that's for push. 
            # On VPS, we need to ensure it can pull.
            # Assuming VPS is already logged in or uses a helper.
            
            # Pull new images
            docker compose pull
            
            # Restart services
            docker compose up -d --remove-orphans
            
            echo \"✅ Docker deployment successful!\"
          "
          rm -f /tmp/deploy_key

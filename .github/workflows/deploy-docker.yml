name: Deploy Docker to VPS

on:
  workflow_run:
    workflows: ['Build and Push Docker Images']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Coolify Deployment
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK" ]; then
            echo "❌ COOLIFY_WEBHOOK secret is not set!"
            exit 1
          fi

          if [ -z "$COOLIFY_TOKEN" ]; then
            echo "❌ COOLIFY_TOKEN secret is not set!"
            exit 1
          fi

          echo "🚀 Triggering Coolify deployment..."
          curl -X POST "$COOLIFY_WEBHOOK" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            --fail-with-body

      - name: Restart coolify-proxy (delay 1 min)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

          echo "⏳ Waiting 60s for containers to settle before restarting proxy..."
          sleep 60

          echo "🔄 Restarting coolify-proxy..."
          ssh "${VPS_USER}@${VPS_HOST}" "docker restart coolify-proxy"
          echo "✅ coolify-proxy restarted."

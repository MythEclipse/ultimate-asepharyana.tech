name: Deploy Docker to VPS

on:
  workflow_run:
    workflows: ['Build and Push Docker Images']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_TARGET_DIR: ~/ultimate-asepharyana.cloud
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key $VPS_USER@$VPS_HOST "
            cd $VPS_TARGET_DIR

            # Pull latest source (docker-compose.yml, nginx config, etc.)
            git fetch origin main
            git reset --hard origin/main

            # Pull only images that have new tags (skips unchanged)
            docker compose pull --ignore-pull-failures

            # Restart only containers whose images changed
            docker compose up -d --remove-orphans

            # Remove dangling images to reclaim disk space
            docker image prune -f

            echo \"✅ Docker deployment successful!\"
          "
          rm -f /tmp/deploy_key

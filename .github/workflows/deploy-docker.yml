name: Deploy Docker to VPS

on:
  workflow_run:
    workflows: ['Build and Push Docker Images']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Trigger Coolify Deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          # List your Coolify Application UUIDs here:
          COOLIFY_RESOURCE_UUIDS: |
            lgk8440ogo0kooo404g8wg8c
            ds04gc480kww4s04o84o80ok
            bsgsocwcssc8c4g0kkok8s4k
            gg84k8ggw4cgog0gsos4gwko
            z0g0k4k8gwko4ogwc0koogkc
        run: |
          if [ -z "$COOLIFY_TOKEN" ]; then
            echo "❌ COOLIFY_TOKEN secret is not set!"
            exit 1
          fi

          echo "🚀 Triggering Coolify deployments for hardcoded resource UUIDs..."
          FAILED=0
          IFS=$'\n' read -r -d '' -a uuids <<< "$COOLIFY_RESOURCE_UUIDS" || true
          for uuid in "${uuids[@]}"; do
            uuid=$(echo "$uuid" | xargs) # trim whitespace
            if [ -z "$uuid" ]; then
              continue
            fi
            
            url="https://coolify.asepharyana.tech/api/v1/deploy?uuid=${uuid}&force=true"
            echo "➡️ Calling API for UUID: $uuid"
            
            # Using GET as specified by Coolify v4 API
            curl -X GET "$url" \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              --fail-with-body || {
                echo "❌ Failed to trigger deployment for $uuid"
                FAILED=$((FAILED + 1))
              }
          done
          
          if [ "$FAILED" -ne 0 ]; then
            echo "❌ $FAILED deployment(s) failed."
            exit 1
          fi
          echo "✅ All Coolify deployments triggered successfully."

      - name: Restart coolify-proxy (delay 1 min)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

          echo "⏳ Waiting 60s for containers to settle before restarting proxy..."
          sleep 60

          echo "🔄 Restarting coolify-proxy..."
          ssh "${VPS_USER}@${VPS_HOST}" "docker restart coolify-proxy"
          echo "✅ coolify-proxy restarted."
